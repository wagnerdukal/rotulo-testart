<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotulo Testart</title>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: 'hsl(207,69%,46%)' },
        },
      },
    };
  </script>

  <style>
    body { background-color: hsl(210,50%,96%); color: hsl(213,40%,18%); font-family: system-ui, -apple-system, sans-serif; }
    input, select, textarea { outline: none; }
    input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 2px hsl(207,69%,70%); border-radius: 0.5rem; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="js/utils.js"></script>
  <script type="text/babel" data-presets="react" src="js/icons.js"></script>
  <script type="text/babel" data-presets="react" src="js/login.js"></script>
  <script type="text/babel" data-presets="react" src="js/navbar.js"></script>
  <script type="text/babel" data-presets="react" src="js/novo-pedido.js"></script>
  <script type="text/babel" data-presets="react" src="js/fila-impressao.js"></script>
  <script type="text/babel" data-presets="react" src="js/gerenciar-produtos.js"></script>
  <script type="text/babel" data-presets="react" src="js/usuarios.js"></script>
  <script type="text/babel" data-presets="react" src="js/app.js"></script>

</body>
</html>
