<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotulo Artpharma</title>

  <!-- React + Babel + Tailwind via CDN (sem build step) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'hsl(207,69%,46%)',
          },
        },
      },
    };
  </script>

  <style>
    body { background-color: hsl(210,50%,96%); color: hsl(213,40%,18%); font-family: system-ui, -apple-system, sans-serif; }
    input, select, textarea { outline: none; }
    input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 2px hsl(207,69%,70%); border-radius: 0.5rem; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    Ordem de carregamento obrigatória:
    1. utils.js      → constantes, helpers, hook
    2. icons.js      → ícones SVG
    3. login.js      → página de login
    4. navbar.js     → barra de navegação
    5. novo-pedido.js
    6. fila-impressao.js
    7. gerenciar-produtos.js
    8. usuarios.js
    9. app.js        → raiz + ReactDOM.render
  -->
  <script type="text/babel" src="js/utils.js"></script>
  <script type="text/babel" src="js/icons.js"></script>
  <script type="text/babel" src="js/login.js"></script>
  <script type="text/babel" src="js/navbar.js"></script>
  <script type="text/babel" src="js/novo-pedido.js"></script>
  <script type="text/babel" src="js/fila-impressao.js"></script>
  <script type="text/babel" src="js/gerenciar-produtos.js"></script>
  <script type="text/babel" src="js/usuarios.js"></script>
  <script type="text/babel" src="js/app.js"></script>

</body>
</html>
